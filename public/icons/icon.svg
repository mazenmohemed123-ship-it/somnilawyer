<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <!-- Dark green background matching the uploaded image -->
  <rect width="1080" height="1080" fill="#073B22"/>

  <g fill="none" stroke="#B89A3E" stroke-linecap="round" stroke-linejoin="round">
    <!-- Central vertical pole -->
    <line x1="540" y1="290" x2="540" y2="730" stroke-width="14"/>

    <!-- Top ball on pole -->
    <circle cx="540" cy="258" r="30" stroke-width="13" fill="#B89A3E"/>

    <!-- Arched horizontal beam -->
    <path d="M220 390 Q380 330 540 320 Q700 330 860 390" stroke-width="18"/>

    <!-- Left knob at beam end -->
    <circle cx="222" cy="390" r="24" stroke-width="13" fill="#B89A3E"/>

    <!-- Right knob at beam end -->
    <circle cx="858" cy="390" r="24" stroke-width="13" fill="#B89A3E"/>

    <!-- Left pan chains (two lines) -->
    <line x1="200" y1="412" x2="160" y2="570" stroke-width="11"/>
    <line x1="244" y1="412" x2="284" y2="570" stroke-width="11"/>

    <!-- Right pan chains (two lines) -->
    <line x1="836" y1="412" x2="796" y2="570" stroke-width="11"/>
    <line x1="880" y1="412" x2="920" y2="570" stroke-width="11"/>

    <!-- Left pan bowl -->
    <path d="M155 570 Q222 622 290 570" stroke-width="13"/>

    <!-- Right pan bowl -->
    <path d="M793 570 Q858 622 926 570" stroke-width="13"/>

    <!-- Base pedestal layers -->
    <rect x="488" y="730" width="104" height="20" rx="5" stroke-width="11" fill="none"/>
    <rect x="450" y="748" width="180" height="18" rx="4" stroke-width="11" fill="none"/>
    <rect x="408" y="762" width="264" height="26" rx="8" stroke-width="11" fill="none"/>
    <rect x="390" y="784" width="300" height="18" rx="4" stroke-width="11" fill="none"/>
  </g>
</svg>
